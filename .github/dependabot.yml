# Actualizaciones automáticas de dependencias (PRs semanales, agrupados).
# Las deps de runtime están pinneadas por reproducibilidad; dependabot abre el
# PR y CI valida — el merge es manual y consciente.
version: 2
updates:
  # GitHub Actions usadas en los workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # pip — un manifest por servicio (mismos locks que consumen los Dockerfiles).
  - package-ecosystem: pip
    directory: "/"              # requirements.txt (trainer/ui) + requirements-dev.txt
    schedule:
      interval: weekly
    groups:
      python-root:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: "/api"           # api/requirements.txt
    schedule:
      interval: weekly
    groups:
      python-api:
        patterns: ["*"]
