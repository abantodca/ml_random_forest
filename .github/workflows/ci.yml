# CI: valida cada push a main y cada PR. NO despliega — el CD (GHA OIDC →
# ECR/ECS) vive como Terraform pegable en GUIA_MLOPS_AWS_V2.md #3.10 (decisión
# deliberada: ver CLAUDE.md). Este workflow cubre lint + tests P0 + build de
# imágenes, exactamente los comandos documentados en CONTRIBUTING.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs viejos del mismo ref cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Instalar ruff (versión pinneada)
        run: pip install ruff==0.15.13
      - name: ruff check
        run: ruff check src/ main.py scripts/ tests/ api/ ui/
      - name: ruff format --check
        run: ruff format --check src/ main.py scripts/ tests/ api/ ui/

  test:
    name: Tests P0 (en contenedor, versiones de prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Construir las imágenes valida además los Dockerfiles (trainer/api/ui).
      - name: Build de imágenes
        run: docker compose build trainer api ui
      - name: Suite P0 — trainer
        run: |
          docker compose run --rm --no-deps \
            -v "${{ github.workspace }}/tests:/app/tests" \
            --entrypoint sh trainer \
            -c "pip install -q pytest && PYTHONPATH=/app python -m pytest tests/ -q"
      - name: Suite P0 — API (test conformal)
        run: |
          docker compose run --rm --no-deps --user root \
            -v "${{ github.workspace }}/tests:/app/tests" \
            --entrypoint sh api \
            -c "/opt/venv/bin/pip install -q pytest && cd /app && /opt/venv/bin/python -m pytest tests/test_api_conformal.py -q"
