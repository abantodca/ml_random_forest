version: "3"

# `.env` es opcional. Si no existe, los defaults de config.py aplican.
dotenv: [ ".env" ]

# Includes namespaced por etapa. Cada tasks/X.yml documenta su uso en el header.
includes:
  infra:
    taskfile: ./tasks/infra.yml
    vars: { PROJECT: '{{.PROJECT}}', REGION: '{{.REGION}}' }
  ecr:
    taskfile: ./tasks/ecr.yml
    vars: { PROJECT: '{{.PROJECT}}', REGION: '{{.REGION}}' }
  batch:
    taskfile: ./tasks/batch.yml
    vars: { PROJECT: '{{.PROJECT}}', REGION: '{{.REGION}}', QUEUE_SPOT: '{{.QUEUE_SPOT}}', QUEUE_OD: '{{.QUEUE_OD}}' }
  ops:
    taskfile: ./tasks/ops.yml
    vars: { PROJECT: '{{.PROJECT}}', REGION: '{{.REGION}}', QUEUE_SPOT: '{{.QUEUE_SPOT}}', QUEUE_OD: '{{.QUEUE_OD}}' }
  local:
    taskfile: ./tasks/local.yml
    vars: { PROJECT: '{{.PROJECT}}', REGION: '{{.REGION}}' }

vars:
  # TUNING se define a nivel-tarea en `train` (default prod_xl), NO aqui: los
  # vars globales se COMPARTEN con los includes (tasks/batch.yml) y un default
  # global de un lado pisaria al del otro (batch usa default "prod").
  VARIETIES: '{{.VARIETIES | default "POP"}}'
  PARALLEL:  '{{.PARALLEL  | default "1"}}'
  PROJECT:   '{{.PROJECT   | default "ml-training"}}'
  REGION:    '{{.AWS_DEFAULT_REGION | default "us-east-1"}}'
  # Nombres de las colas Batch: fuente unica de la convencion, inyectada a los
  # includes ops: y batch: (antes se definia el mismo printf en ambos archivos).
  QUEUE_SPOT: '{{.QUEUE_SPOT | default (printf "%s-job-queue-spot"     .PROJECT)}}'
  QUEUE_OD:   '{{.QUEUE_OD   | default (printf "%s-job-queue-ondemand" .PROJECT)}}'
  HOST_UID:  { sh: id -u }
  HOST_GID:  { sh: id -g }
  # Patron reutilizado: correr un modulo Python en el container trainer sin
  # levantar mlflow/postgres. Lo usan data:split y eda.
  # --user fija el uid/gid del host: lo que el contenedor escriba al bind-mount
  # (./data, ./reports) sale con tu ownership, no como mluser (uid 1001) — evita
  # el PermissionError al sobrescribir DB-HISTORICA.xlsx. MPLCONFIGDIR=/tmp porque
  # con --user el $HOME de la imagen no es escribible por el uid del host (matplotlib en eda).
  DC_PY: docker compose run --rm --no-deps --user "{{.HOST_UID}}:{{.HOST_GID}}" -e MPLCONFIGDIR=/tmp --entrypoint python trainer
  # SUFFIX (sufijo del Account ID para bucket/repo names) NO se computa como
  # variable `sh:` (ni top-level ni por-tarea): Task evalua TODAS las vars `sh:`
  # al cargar el Taskfile -en cada invocacion, incluso `task --list` o tareas
  # locales como `task up`-, lo que dispararia `aws sts get-caller-identity` y
  # romperia todo en una maquina sin AWS. Solo `destroy`/`nuke` lo necesitan ->
  # se calcula DENTRO de sus `cmds:` (runtime real), via scripts/aws-suffix.sh.

tasks:

  default:
    desc: "Quickstart del pipeline + ejemplos. Detalle por tarea: task --list"
    silent: true
    cmds:
      # Quickstart curado (los 15-20 comandos del 90% del dia). El catalogo
      # completo y exacto vive en `task --list`; el runbook paso-a-paso del
      # primer stand-up AWS, en GUIA_MLOPS_AWS_V2.md. Aqui solo lo esencial,
      # para que no derive cada vez que se agrega una tarea.
      - |
        cat <<'EOF'

          ml_training · forecast de productividad de cosecha (KG/JR_H) por variedad
          Entrena XGBoost + LightGBM por variedad, elige campeon y registra en MLflow.

          ╔═══════════════════════════════════════════════════════════════════════════╗
          ║  LOCAL · docker compose (postgres · mlflow · reports · api · ui)          ║
          ╠═══════════════════════════════════════════════════════════════════════════╣
          ║  task build             rebuild de imagenes + levanta todo el stack       ║
          ║  task up                levanta el stack sin rebuild                      ║
          ║  task data:split        genera data/training/DB-HISTORICA.xlsx            ║
          ║  task train             entrena + publica el HTML del campeon             ║
          ║  task down              apaga servicios (preserva el volumen Postgres)    ║
          ║  task lint              ruff check de todo el monorepo                    ║
          ╚═══════════════════════════════════════════════════════════════════════════╝
            Setup 1ª vez:  task local:ensure-buckets  +  completar buckets en .env
            URLs:  UI :8501 · API :8000/docs · MLflow :5000 · Reports/Artifacts :8080

          ╔═══════════════════════════════════════════════════════════════════════════╗
          ║  AWS · PRIMERA VEZ de cero  ·  corré los pasos EN ESTE ORDEN              ║
          ╠═══════════════════════════════════════════════════════════════════════════╣
          ║  0) aws sts get-caller-identity        valida tus credenciales AWS        ║
          ║  1) task infra:bootstrap               crea el backend S3 de tfstate      ║
          ║                                        (UNA sola vez por cuenta+region)   ║
          ║  2) cp infra/envs/prod/terraform.tfvars.example \                         ║
          ║        infra/envs/prod/terraform.tfvars                                   ║
          ║     ...y editá alert_email.  SIN este archivo, 'task deploy' falla.       ║
          ║  3) task deploy                        stand-up completo → imprime URLs   ║
          ║  4) task infra:upload-raw             sube el Excel raw a S3 (tras deploy)║
          ╠═══════════════════════════════════════════════════════════════════════════╣
          ║  Opcional CI/CD (deploy por GitHub Actions, 3 pasos):                     ║
          ║    a) task infra:bootstrap-oidc       crea el rol IAM (UNA vez)           ║
          ║    b) poné  enable_cicd = true  en infra/envs/prod/terraform.tfvars       ║
          ║    c) task infra:apply                aplica el cambio                    ║
          ║  Reempezar de cero (borra el tfstate):  task infra:reset-state            ║
          ╚═══════════════════════════════════════════════════════════════════════════╝
            ⚠ Tras el 1er 'task deploy', AWS manda un mail "Subscription
            Confirmation" a alert_email: ABRELO y confirma. Sin ese clic la
            suscripcion queda PendingConfirmation y NO llegan alertas de Batch
            (FAILED/SUCCEEDED). Si cambias alert_email, repites la confirmacion.

          ╔═══════════════════════════════════════════════════════════════════════════╗
          ║  AWS · DÍA A DÍA (ya desplegado)        detalle: infra:/ecr:/batch:/ops:  ║
          ╠═══════════════════════════════════════════════════════════════════════════╣
          ║  task wake · sleep      encender · apagar (pausa corta, mantiene NAT)     ║
          ║  task teardown          apagar largo: libera NAT (~$3/mes idle)           ║
          ║  task rebuild           volver tras teardown (recrea NAT + servicios)     ║
          ║  task status · urls     estado del cluster · URLs publicas del ALB        ║
          ║  task smoke             deploy + 1 job Batch POP de humo                  ║
          ║  task batch:train VARIETIES=POP            entrenamiento en Batch (bg)    ║
          ║  task batch:train VARIETIES=A,B,C,D PARALLEL=4   4 variedades en paralelo ║
          ║  task batch:logs FOLLOW=true   logs EN VIVO (Ctrl+C no detiene el job)    ║
          ║  task batch:watch              BLOQUEA hasta SUCCEEDED/FAILED             ║
          ║  task batch:status             jobs activos en las colas                  ║
          ║  task ops:promote MODEL_NAME=… VERSION=N   promover a Production          ║
          ║  ⚠ destructivo (riesgo creciente):  task destroy · nuke                   ║
          ╚═══════════════════════════════════════════════════════════════════════════╝

          ╔═══════════════════════════════════════════════════════════════════════════╗
          ║  Entrenar  (mismo default local y Batch: TUNING=prod_xl)                  ║
          ╠═══════════════════════════════════════════════════════════════════════════╣
          ║  task train VARIETIES=POP                 ~4-6 h   prod_xl · DEFAULT      ║
          ║  task train VARIETIES=POP TUNING=smoke    ~1 min   sanity (no registra)   ║
          ║  task train VARIETIES=POP TUNING=prod     ~2 h     modelo a promover      ║
          ║  task train VARIETIES=all PARALLEL=3               todas, 3 en paralelo   ║
          ╚═══════════════════════════════════════════════════════════════════════════╝
            En Batch el dispatcher rutea por queue:  prod_xl → On-Demand (sin
            interrupciones, jobs de ~4-6 h) · resto → Spot (−70% costo).
            PARALLEL=N tambien aplica en Batch (>1 variedad): 1 job, N en paralelo.
            Con PARALLEL>1 los hilos se reparten solos (MODEL_N_JOBS=cores//N):
            PARALLEL=4 llena los 16 vCPU del job Batch sin oversubscription. NO
            pongas PARALLEL > vCPU: mas procesos que cores frena TODO el job.

          ╔═══════════════════════════════════════════════════════════════════════════╗
          ║  Variables  (override por CLI · VAR=valor)                                ║
          ╠═══════════════════════════════════════════════════════════════════════════╣
          ║  VARIETIES   POP | POP,VENTURA | all          (default POP)               ║
          ║  TUNING      smoke | dev | prod | prod_xl      (default prod_xl)          ║
          ║  PARALLEL    N variedades en paralelo          (default 1)                ║
          ║  SEED        semilla de reproducibilidad       (default 42)               ║
          ╚═══════════════════════════════════════════════════════════════════════════╝

          ╔═══════════════════════════════════════════════════════════════════════════╗
          ║  Mas detalle                                                              ║
          ╠═══════════════════════════════════════════════════════════════════════════╣
          ║  Catalogo completo:  task --list     Runbook AWS:  GUIA_MLOPS_AWS_V2.md   ║
          ╚═══════════════════════════════════════════════════════════════════════════╝

        EOF

  build:
    desc: "1ª vez o al cambiar codigo/Dockerfile: rebuild imagenes (trainer+api+ui) + levanta TODO el stack"
    cmds:
      - task: _ensure_dirs
      - docker compose build trainer api ui
      - docker compose up -d postgres mlflow reports api ui
      - task: _print_urls

  up:
    desc: "Levanta el stack local completo (db + mlflow + reports + api + ui) sin rebuild"
    cmds:
      - task: _ensure_dirs
      - docker compose up -d postgres mlflow reports api ui
      - task: _print_urls

  mlflow:reconcile:
    desc: "Reconstruye en el backend MLflow los modelos huerfanos que solo viven en S3 (idempotente). Args: DRY=1 para solo reportar. Corre automatico en cada `up` via el servicio mlflow-init."
    cmds:
      - docker compose run --rm --no-deps mlflow-init {{if eq .DRY "1"}}--dry-run{{end}}

  data:split:
    desc: "Paso 1: genera data/training/DB-HISTORICA.xlsx desde el Excel historico"
    cmds:
      - >-
        {{.DC_PY}} -m scripts.prepare_data
        --input  data/BD_HISTORICO_ACUMULADO.xlsx
        --output data/training/DB-HISTORICA.xlsx
        --min-rows 100

  data:upload:
    desc: "Paso 1b (opcional): sube el Excel acumulado a s3://$S3_DATA_BUCKET/$S3_DATA_KEY. Solo si .env activa el hydrate (replica el flujo prod/Batch); si no, `train` lee ./data y este paso sobra."
    cmds:
      # El trainer (main.py::_hydrate_data_from_s3) baja este Excel al boot SOLO
      # si S3_DATA_BUCKET+S3_DATA_KEY estan en .env. Sin el objeto en S3 -> 404 y
      # `train` aborta. Esta task lo sube para que el hydrate funcione local igual
      # que en AWS Batch. Ver #4.13.
      - |
        : "${S3_DATA_BUCKET:?S3_DATA_BUCKET no esta en .env -> hydrate S3 desactivado; nada que subir (train leeria ./data)}"
        KEY="${S3_DATA_KEY:-BD_HISTORICO_ACUMULADO.xlsx}"
        if [ ! -f data/BD_HISTORICO_ACUMULADO.xlsx ]; then
          echo "ERROR: data/BD_HISTORICO_ACUMULADO.xlsx no existe localmente."
          exit 1
        fi
        aws s3 cp data/BD_HISTORICO_ACUMULADO.xlsx "s3://${S3_DATA_BUCKET}/${KEY}" --region "{{.REGION}}"

  eda:
    desc: "Paso 2 (opcional): EDA estadistico standalone. Args: VARIETIES=POP"
    cmds:
      - "{{.DC_PY}} -m src.diagnostics.eda --variety {{.VARIETIES}}"

  train:
    desc: "Paso 3: entrena + genera HTML estatico en reports/. Vars: VARIETIES TUNING PARALLEL SEED"
    deps: [_up]
    vars:
      # Default prod_xl (overnight, el mas exhaustivo). A nivel-tarea, no global:
      # evita el choque de vars compartidas con tasks/batch.yml (que usa "prod").
      TUNING: '{{.TUNING | default "prod_xl"}}'
      GIT_SHA:   { sh: bash scripts/metadata.sh git-sha }
      GIT_DIRTY: { sh: bash scripts/metadata.sh git-dirty }
      DATA_SHA:  { sh: bash scripts/metadata.sh data-sha }
      SEED: '{{.SEED | default "42"}}'
    cmds:
      - 'echo ">> train: VARIETIES={{.VARIETIES}} TUNING={{.TUNING}} (default prod_xl) SEED={{.SEED}} · backends LGB+XGB"'
      # Guard: prod_xl es el default y dura ~4-6 h. Confirmar solo si hay TTY
      # (interactivo) -> no bloquea CI ni usos no-interactivos.
      - |
        if [ "{{.TUNING}}" = "prod_xl" ] && [ -t 0 ]; then
          printf ">> TUNING=prod_xl lanza un entrenamiento de ~4-6 h. Continuar? [y/N] "
          read ans
          case "$ans" in [yY]*) ;; *) echo "Abortado (usa TUNING=smoke|dev|prod para correr mas corto)."; exit 1 ;; esac
        fi
      - |
        if [ "{{.DATA_SHA}}" = "missing" ]; then
          echo "ERROR: data/training/DB-HISTORICA.xlsx no existe. Correr 'task data:split' primero."
          exit 1
        fi
      # --user/MPLCONFIGDIR: misma razon que DC_PY (ver vars). Sin --user el
      # trainer corre como mluser (uid 1001) y no puede escribir los bind-mounts
      # (./logs ./artifacts ./reports) que data:split dejo con tu ownership ->
      # PermissionError en logs/pipeline_run.log. MPLCONFIGDIR=/tmp porque con
      # --user el $HOME de la imagen no es escribible (matplotlib en los HTML).
      - >-
        docker compose run --rm
        --user "{{.HOST_UID}}:{{.HOST_GID}}"
        -e MPLCONFIGDIR=/tmp
        -e GIT_SHA={{.GIT_SHA}}
        -e GIT_DIRTY={{.GIT_DIRTY}}
        -e DATA_SHA={{.DATA_SHA}}
        -e SEED={{.SEED}}
        trainer
        --varieties {{.VARIETIES}}
        --tuning {{.TUNING}}
        --parallel-varieties {{.PARALLEL}}
      - task: _print_urls

  down:
    desc: "LOCAL: detiene el stack docker-compose (preserva volumen Postgres). NO es el apagado AWS -> ese es `task sleep`"
    cmds:
      - docker compose down

  _up:
    internal: true
    cmds:
      - task: _ensure_dirs
      - docker compose up -d postgres mlflow reports
      - task: _print_urls

  _ensure_dirs:
    internal: true
    silent: true
    cmds:
      - mkdir -p artifacts reports logs data/training

  _print_urls:
    internal: true
    silent: true
    cmds:
      - |
        cat <<EOF

        ════════════════════════════════════════════════════════════════════
         Servicios LOCAL listos:
           UI (dashboard gerencial)   http://localhost:8501
           API (Swagger)              http://localhost:8000/docs
           MLflow runs                http://localhost:5000
           MLflow Model Registry      http://localhost:5000/#/models
           Reports (campeon HTML)     http://localhost:8080/reports/
           Artifacts                  http://localhost:8080/artifacts/
           S3 backend                 s3://${S3_MLFLOW_BUCKET}/
        ────────────────────────────────────────────────────────────────────
         Nota: en local NO hay :80 (eso es el ALB de produccion). Cada
         servicio expone su propio puerto. Entrena con: task train VARIETIES=POP TUNING=smoke
        ════════════════════════════════════════════════════════════════════
        EOF

  lint:
    desc: "ruff check src/ main.py scripts/ api/ ui/ (config en pyproject.toml)"
    cmds:
      - ruff check src/ main.py scripts/ api/ ui/

  # ═══ Atajos high-level del stack AWS ════════════════════════════════════════

  deploy:
    desc: "AWS: stand-up completo desde cero o aplicar cambios de infra (storage -> 5 imagenes -> resto) + URLs. (Para solo reanudar: `wake`; tras teardown: `rebuild`)"
    cmds:
      # Pre-check: si los buckets *-data-* / *-artifacts-* existen en AWS pero
      # no en tfstate (tipico tras nuke parcial o re-bootstrap), `apply
      # module.storage` falla con BucketAlreadyExists. Fail-fast con instrucciones.
      - task: ops:state-drift
      # Pre-check: secrets en pending deletion (recovery window 30d tras destroy)
      # rompen el apply con "secret already scheduled for deletion". Purga idempotente.
      - task: ops:secrets-pending
      - 'echo ">>> Oleada A: apply module.storage (S3 + ECR)..."'
      - task: infra:apply
        vars: { TARGET: module.storage }
      - 'echo ">>> Oleada B: build + push 5 imagenes..."'
      - task: ecr:build-all
      - 'echo ">>> Oleada C: apply resto (network, mlflow, batch, ...)..."'
      - task: infra:apply
      - 'echo ""'
      - 'echo "Deploy completo. URLs publicas:"'
      - task: infra:urls

  smoke:
    desc: "AWS: deploy + smoke test (POP, tuning=smoke, ~1 min)"
    cmds:
      - task: deploy
      - task: batch:smoke

  wake:
    desc: "AWS: encender un stack YA desplegado y dormido (sleep). Reanuda RDS+Fargate. Idempotente. (Tras teardown usa `rebuild`; desde cero, `deploy`)"
    cmds:
      - task: ops:up

  sleep:
    desc: "AWS: apagar stack (pausa corta). Para RDS+Fargate pero MANTIENE el NAT (~$3/mes idle). Para liberar NAT usa `teardown`"
    cmds:
      - task: ops:down

  status:
    desc: "AWS: outputs de Terraform + estado del cluster + URLs publicas"
    cmds:
      - 'echo "=== Terraform outputs ==="'
      - task: infra:output
      - 'echo ""'
      - 'echo "=== Cluster ==="'
      - task: ops:status
      - task: infra:urls

  urls:
    desc: "AWS: imprime las URLs publicas de produccion (derivadas del ALB)"
    cmds:
      - task: infra:urls

  teardown:
    desc: "AWS: apagado LARGO. sleep + destroy de volatiles, LIBERA el NAT (ahorra ~$3/mes). Conserva storage (S3) + state. Volver: `rebuild`"
    cmds:
      - task: ops:teardown

  rebuild:
    desc: "AWS: volver tras un `teardown`. Recrea NAT + volatiles (re-apply) y enciende. (Si solo estaba dormido con sleep, usa `wake`)"
    cmds:
      - task: ops:rebuild

  destroy:
    desc: "AWS DESTRUCTIVO: drena Batch, vacia S3/ECR, terraform destroy total"
    prompt: "Destruira envs/prod (S3 + ECR + RDS + ...). Irreversible. Continuar?"
    cmds:
      - task: ops:down
      - 'echo ">>> Vaciando buckets S3 versionados + purgando ECR..."'
      - |
        set -e
        SUFFIX="$(bash scripts/aws-suffix.sh)"
        source tasks/lib/nuke.sh
        empty_bucket "{{.PROJECT}}-data-${SUFFIX}"
        empty_bucket "{{.PROJECT}}-artifacts-${SUFFIX}"
        purge_ecr    "{{.PROJECT}}"
        purge_ecr    "{{.PROJECT}}-mlflow"
        purge_ecr    "{{.PROJECT}}-reports"
        purge_ecr    "{{.PROJECT}}-api"
        purge_ecr    "{{.PROJECT}}-ui"
      - 'echo ">>> terraform destroy total..."'
      - task: infra:destroy
      # Post-destroy: force-delete secrets que quedaron en pending deletion
      # (recovery_window_in_days=30 por defecto en aws_secretsmanager_secret).
      # Sin esto, el siguiente `task deploy` falla con "secret already
      # scheduled for deletion" al re-crear el mismo nombre.
      - 'echo ">>> Force-delete de secrets en pending deletion..."'
      - |
        set -e
        source tasks/lib/nuke.sh
        purge_secret "{{.PROJECT}}-rds-password"

  nuke:
    desc: "AWS IRREVERSIBLE: destroy + tfstate bucket + OIDC provider"
    prompt: "NUKE COMPLETO: borra state remoto + OIDC. Despues necesitas re-bootstrap. Continuar?"
    cmds:
      - task: destroy
      - 'echo ">>> Borrando bucket tfstate + OIDC..."'
      - |
        set -e
        SUFFIX="$(bash scripts/aws-suffix.sh)"
        source tasks/lib/nuke.sh
        # use_lockfile guarda el lock como objeto en el mismo bucket -> se va
        # con `empty_bucket` (no hay tabla DynamoDB que limpiar).
        empty_bucket "{{.PROJECT}}-tfstate-${SUFFIX}" true
        delete_oidc
      - 'echo ""'
      - 'echo "NUKE COMPLETO. Para volver: task infra:bootstrap + task infra:bootstrap-oidc + task deploy"'
