server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Redirects relativos: el contenedor escucha en :80 pero el host publica
    # :8080; un redirect absoluto perderia el puerto (Location: 127.0.0.1/...).
    absolute_redirect off;

    # La raiz redirige al dashboard de reportes (los bind-mounts cuelgan de
    # /reports y /artifacts; la imagen nginx trae su propio index.html en `/`).
    location = / {
        return 302 /reports/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.(joblib|xlsx|json)$ {
        add_header Content-Disposition 'attachment';
    }
}
